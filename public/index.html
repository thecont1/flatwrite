<body>
  <div class="app-shell" id="app-shell">

    <!-- Mobile hamburger + logo (fixed position, visible < 760px) -->
    <button class="mobile-hamburger" id="mobile-hamburger" type="button" title="Open menu" aria-label="Toggle navigation drawer">
      <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
    </button>
    <span class="mobile-logo">FlatWrite</span>

    <!-- Drawer backdrop (visible < 760px when sidebar open) -->
    <div class="drawer-backdrop" id="drawer-backdrop"></div>

    <!-- ===== SIDEBAR (Left Utility Rail) ===== -->
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-inner">
        <!-- App title -->
        <h1 class="app-title">FlatWrite</h1>
        <p class="tagline">Write once, style many worlds.</p>

        <!-- Load section -->
        <div class="load-panel">
          <p class="sidebar-section-label">Load</p>
          <div class="load-buttons">
            <button class="comp-btn load-btn" id="btn-load-url" type="button">From URL</button>
            <button class="comp-btn load-btn" id="btn-load-local" type="button">From Disk</button>
          </div>
          <input type="file" id="load-file-input" class="sr-only" accept=".md,.txt" aria-label="Load markdown file from disk" />
        </div>

        <hr class="sidebar-divider" />

        <!-- Surface mode toggle: Doc | App -->
        <label class="sidebar-section-label">Surface</label>
        <div class="surface-toggle" id="surface-toggle">
          <button class="surface-btn active" data-surface="doc" type="button">Doc</button>
          <button class="surface-btn" data-surface="app" type="button" disabled>App</button>
          <span class="surface-slider" id="surface-slider"></span>
        </div>

        <hr class="sidebar-divider" />

        <!-- Engine selector with attached Document controls pane -->
        <div class="engine-pane doc-only">
          <label class="sidebar-section-label">Engine</label>
          <div class="engine-toggle" id="engine-toggle">
            <button class="engine-btn active" data-engine="none" type="button">Plain</button>
            <button class="engine-btn" data-engine="pagedjs" type="button" title="Paged.js"><img src="assets/pagedjs-logo.svg" alt="Paged.js" class="engine-logo" /></button>
            <button class="engine-btn" data-engine="vivliostyle" type="button" title="Vivliostyle"><img src="assets/vivliostyle-logo.svg" alt="Vivliostyle" class="engine-logo" /></button>
            <span class="engine-slider" id="engine-slider"></span>
          </div>
          <div class="doc-controls" id="doc-controls">
            <div class="doc-control-row">
              <label for="page-size" class="doc-label">Page</label>
              <select id="page-size" class="doc-select">
                <option value="A0">A0</option>
                <option value="A1">A1</option>
                <option value="A2">A2</option>
                <option value="A3">A3</option>
                <option value="A4" selected>A4</option>
                <option value="A5">A5</option>
                <option value="Letter">Letter</option>
                <option value="Legal">Legal</option>
              </select>
            </div>
            <div class="doc-control-row">
              <span class="doc-label">Orient</span>
              <button class="doc-toggle" id="toggle-orient" type="button" data-state="portrait">Portrait</button>
            </div>
            <div class="doc-control-row">
              <label for="page-margins-lr" class="doc-label">Margins ←→</label>
              <select id="page-margins-lr" class="doc-select">
                <option value="narrow">Narrow</option>
                <option value="normal" selected>Normal</option>
                <option value="wide">Wide</option>
              </select>
            </div>
            <div class="doc-control-row">
              <label for="page-margins-tb" class="doc-label">Margins ↑↓</label>
              <select id="page-margins-tb" class="doc-select">
                <option value="narrow">Narrow</option>
                <option value="normal" selected>Normal</option>
                <option value="wide">Wide</option>
              </select>
            </div>
            <div class="doc-control-row">
              <label for="page-columns" class="doc-label">Columns</label>
              <select id="page-columns" class="doc-select">
                <option value="1" selected>1</option>
                <option value="2">2</option>
                <option value="3">3</option>
              </select>
            </div>
            <div class="doc-control-row">
              <span class="doc-label">Footer</span>
              <button class="doc-toggle" id="toggle-footer" type="button" data-state="off">Off</button>
            </div>
          </div>
        </div>

        <hr class="sidebar-divider" />

        <!-- App surface: Framework selector -->
        <div class="framework-selector app-only">
          <label class="sidebar-section-label">Framework</label>
          <div class="fw-dropdown" id="fw-dropdown">
            <button class="fw-dropdown-btn" id="fw-dropdown-btn" type="button">
              <span id="fw-dropdown-label">Spectre</span>
              <span class="fw-dropdown-arrow">&#x25BC;</span>
            </button>
          </div>
          <select id="framework-dropdown" class="sr-only" aria-hidden="true" tabindex="-1"></select>
        </div>

        <!-- App surface: Component picker -->
        <div class="components-panel app-only">
          <label for="components-grid" class="sidebar-section-label">Components</label>
          <div class="components-grid" id="components-grid"></div>
        </div>

        <!-- UI Zoom -->
        <div class="zoom-selector">
          <label for="zoom-slider" class="sidebar-section-label">Zoom</label>
          <div class="zoom-controls">
            <input type="range" id="zoom-slider" class="zoom-slider" min="50" max="150" value="100" step="5" />
            <span class="zoom-value" id="zoom-value">100%</span>
          </div>
        </div>

        <hr class="sidebar-divider" />
        <p class="sidebar-copy">&copy; 2026 <a href="https://thecontrarian.in" target="_blank" rel="noopener">Mahesh Shantaram</a></p>
      </div>

                    <button class="font-dropdown-btn" id="font-dropdown-btn" type="button">
                      <span id="font-dropdown-label">Inter</span>
                      <span class="font-dropdown-arrow">&#x25BC;</span>
                    </button>
                  </div>
                  <span class="typo-sep"></span>
                  <span class="typo-label">Size</span>
                  <button class="typo-btn" id="size-down" type="button" title="Decrease size">−</button>
                  <button class="typo-btn" id="size-up" type="button" title="Increase size">+</button>
                  <span class="typo-sep"></span>
                  <span class="typo-label">Weight</span>
                  <button class="typo-btn" id="weight-down" type="button" title="Lighter">−</button>
                  <button class="typo-btn" id="weight-up" type="button" title="Bolder">+</button>
                  <span class="typo-sep"></span>
                  <span class="typo-label">Spacing</span>
                  <button class="typo-btn" id="line-down" type="button" title="Tighter lines">−</button>
                  <button class="typo-btn" id="line-up" type="button" title="Looser lines">+</button>
                </div>
              </div>
            </div>
            <div class="toolbar-right">
              <span class="char-count" id="char-count"></span>
            </div>
            <div class="mode-switch" id="mode-switch">
              <span class="mode-switch-label active" id="btn-edit" data-mode="edit">Edit</span>
              <span class="mode-switch-label" id="btn-preview" data-mode="preview">View</span>
              <span class="mode-switch-label" id="btn-read" data-mode="read">Read</span>
              <span class="mode-switch-slider" id="mode-switch-slider"></span>
            </div>
          </div>

          <!-- Editor textarea -->
          <div class="editor-wrap" id="editor-wrap">
            <label for="editor" class="sr-only">Markdown editor</label>
            <textarea
              id="editor"
              class="editor"
              spellcheck="true"
              placeholder="Start writing your markdown here…"
            ></textarea>
          </div>

          <!-- Preview pane (hidden by default) — uses iframe for sandboxed rendering -->
          <div class="preview-wrap hidden" id="preview-wrap">
            <div class="width-handle width-handle-left" id="width-handle-left" title="Drag to resize"></div>
            <iframe id="preview-frame" class="preview-frame active" title="Preview" sandbox="allow-scripts allow-same-origin allow-popups allow-popups-to-escape-sandbox"></iframe>
            <iframe id="preview-frame-next" class="preview-frame" title="Preview staging" sandbox="allow-scripts allow-same-origin allow-popups allow-popups-to-escape-sandbox"></iframe>
            <div class="width-handle width-handle-right" id="width-handle-right" title="Drag to resize"></div>
            <div class="width-drag-overlay hidden" id="width-drag-overlay"></div>
            <div class="preview-loader hidden" id="preview-loader" aria-hidden="true">
              <div class="preview-loader-spinner"></div>
            </div>
          </div>

        </div>

        <!-- Export actions (sibling of glass card, positioned at bottom-right) -->
        <div class="export-actions" id="export-actions">
          <button class="export-icon" id="btn-export-md" type="button" title="Open as .md" aria-label="Export Markdown">
            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" fill="currentColor" viewBox="0 0 16 16"><path fill-rule="evenodd" d="M14 4.5V14a2 2 0 0 1-2 2H9v-1h3a1 1 0 0 0 1-1V4.5h-2A1.5 1.5 0 0 1 9.5 3V1H4a1 1 0 0 0-1 1v9H2V2a2 2 0 0 1 2-2h5.5zM.706 13.189v2.66H0V11.85h.806l1.14 2.596h.026l1.14-2.596h.8v3.999h-.716v-2.66h-.038l-.946 2.159h-.516l-.952-2.16H.706Zm3.919 2.66V11.85h1.459q.609 0 1.005.234t.589.68q.195.445.196 1.075 0 .634-.196 1.084-.197.451-.595.689-.396.237-1 .237H4.626Zm1.353-3.354h-.562v2.707h.562q.279 0 .484-.082a.8.8 0 0 0 .334-.252 1.1 1.1 0 0 0 .196-.422q.067-.252.067-.592a2.1 2.1 0 0 0-.117-.753.9.9 0 0 0-.354-.454q-.238-.152-.61-.152"/></svg>
          </button>
          <button class="export-icon" id="btn-export-html" type="button" title="Open as .html" aria-label="Export HTML">
            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" fill="currentColor" viewBox="0 0 16 16"><path fill-rule="evenodd" d="M14 4.5V11h-1V4.5h-2A1.5 1.5 0 0 1 9.5 3V1H4a1 1 0 0 0-1 1v9H2V2a2 2 0 0 1 2-2h5.5zm-9.736 7.35v3.999h-.791v-1.714H1.79v1.714H1V11.85h.791v1.626h1.682V11.85h.79Zm2.251.662v3.337h-.794v-3.337H4.588v-.662h3.064v.662zm2.176 3.337v-2.66h.038l.952 2.159h.516l.946-2.16h.038v2.661h.715V11.85h-.8l-1.14 2.596H9.93L8.79 11.85h-.805v3.999zm4.71-.674h1.696v.674H12.61V11.85h.79v3.325Z"/></svg>
          </button>
          <button class="export-icon" id="btn-export-pdf" type="button" title="Save as PDF from print dialog" aria-label="Export PDF">
            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" fill="currentColor" viewBox="0 0 16 16"><path fill-rule="evenodd" d="M14 4.5V14a2 2 0 0 1-2 2h-1v-1h1a1 1 0 0 0 1-1V4.5h-2A1.5 1.5 0 0 1 9.5 3V1H4a1 1 0 0 0-1 1v9H2V2a2 2 0 0 1 2-2h5.5zM1.6 11.85H0v3.999h.791v-1.342h.803q.43 0 .732-.173.305-.175.463-.474a1.4 1.4 0 0 0 .161-.677q0-.375-.158-.677a1.2 1.2 0 0 0-.46-.477q-.3-.18-.732-.179m.545 1.333a.8.8 0 0 1-.085.38.57.57 0 0 1-.238.241.8.8 0 0 1-.375.082H.788V12.48h.66q.327 0 .512.181.185.183.185.522m1.217-1.333v3.999h1.46q.602 0 .998-.237a1.45 1.45 0 0 0 .595-.689q.196-.45.196-1.084 0-.63-.196-1.075a1.43 1.43 0 0 0-.589-.68q-.396-.234-1.005-.234zm.791.645h.563q.371 0 .609.152a.9.9 0 0 1 .354.454q.118.302.118.753a2.3 2.3 0 0 1-.068.592 1.1 1.1 0 0 1-.196.422.8.8 0 0 1-.334.252 1.3 1.3 0 0 1-.483.082h-.563zm3.743 1.763v1.591h-.79V11.85h2.548v.653H7.896v1.117h1.606v.638z"/></svg>
          </button>
          <button class="export-icon" id="btn-share" type="button" title="Share as URL" aria-label="Share as URL">
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71" />
              <path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71" />
            </svg>
          </button>
        </div>

      </div>
    </main>

    <!-- ===== RIGHT RESERVE ZONE (compositional breathing room) ===== -->
    <div class="reserve-zone" aria-hidden="true"></div>

  </div>

  <!-- Load from URL modal (replaces component modal) -->
  <div class="load-modal-overlay hidden" id="load-modal-overlay">
    <div class="load-modal" id="load-modal">
      <div class="load-modal-header">
        <h3 class="load-modal-title" id="load-modal-title">Load from URL</h3>
        <button class="load-modal-close" id="load-modal-close" type="button" title="Close">&times;</button>
      </div>
      <div class="load-modal-body" id="load-modal-body"></div>
      <div class="load-modal-footer">
        <button class="btn btn-mode" id="load-modal-cancel" type="button">Cancel</button>
        <button class="btn btn-export" id="load-modal-insert" type="button">Fetch</button>
      </div>
    </div>
  </div>

  <!-- Component insert modal (App surface) -->
  <div class="comp-modal-overlay hidden app-only" id="comp-modal-overlay">
    <div class="comp-modal" id="comp-modal">
      <div class="comp-modal-header">
        <h3 class="comp-modal-title" id="comp-modal-title">Insert Component</h3>
        <button class="comp-modal-close" id="comp-modal-close" type="button" title="Close">&times;</button>
      </div>
      <div class="comp-modal-body" id="comp-modal-body"></div>
      <div class="comp-modal-footer">
        <button class="btn btn-mode" id="comp-modal-cancel" type="button">Cancel</button>
        <button class="btn btn-export" id="comp-modal-insert" type="button">Insert</button>
      </div>
    </div>
  </div>
</body>
</html>
